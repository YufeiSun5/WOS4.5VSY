[identity]
developer_name=
workspace_name=
note=

[wos4]
url=http://<wos4-host>:<port>/#/login
editor_url=
# Backward-compatible single-account fields. New scripts prefer [wos4.account.*].
username=
password=
proxy=direct
default_account=primary
account_order=primary,secondary,third
lock_file=wos4-artifacts/config/wos4.session-locks.local.json

[wos4.account.primary]
display_name=
username=
password=
operator=
name_prefix=

[wos4.account.secondary]
display_name=
username=
password=
operator=
name_prefix=

[wos4.account.third]
display_name=
username=
password=
operator=
name_prefix=

[wos4.session.slot1]
account=primary
driver=browser-harness
profile_dir=wos4-artifacts/config/chrome-profiles/slot1
isolated_context=wos4-primary
cdp_port=13222
harness_name=wos4_slot1

[wos4.session.slot2]
account=secondary
driver=browser-harness
profile_dir=wos4-artifacts/config/chrome-profiles/slot2
isolated_context=wos4-secondary
cdp_port=13223
harness_name=wos4_slot2

[wos4.session.slot3]
account=third
driver=browser-harness
profile_dir=wos4-artifacts/config/chrome-profiles/slot3
isolated_context=wos4-third
cdp_port=13224
harness_name=wos4_slot3

[ops]
url=http://<ops-host>:<port>/#/login
username=
password=
cloud_id=
host=
port=

[debug_access]
cloud_name=
cloud_id=
host=
port=
username=
password=
